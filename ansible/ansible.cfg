[defaults]
inventory = inventory.ini
host_key_checking = False

[ssh_connection]
# Remplacement de ControlKeepAlive par ServerAliveInterval & ServerAliveCountMax
ssh_args = -o ControlMaster=auto -o ControlPath=/tmp/ansible-ssh-%h-%p-%r -o ControlPersist=10m -o ConnectTimeout=60 -o ServerAliveInterval=15 -o ServerAliveCountMax=3
pipelining = True